<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>f1 — deploy dashboard</title>
<style>
  :root{
    --bg:#0c1210; --panel:#121a17; --panel2:#18221e; --line:#22302a;
    --text:#e6efea; --muted:#8aa096; --dim:#5c7168;
    --jade:#2ea87e; --jade-dim:#1d6b51; --red:#e5534b; --amber:#d4a72c;
    --mono:ui-monospace,SFMono-Regular,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;height:100vh;display:flex;overflow:hidden}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:7px;padding:5px 12px}
  button:hover{border-color:var(--jade-dim)}
  button.primary{background:var(--jade);border-color:var(--jade);color:#06130e;font-weight:600}
  button.primary:hover{filter:brightness(1.1)}
  button.danger:hover{border-color:var(--red);color:var(--red)}
  button:disabled{opacity:.45;cursor:default}
  input[type=text]{font:inherit;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:5px 10px;outline:none}
  input[type=text]:focus{border-color:var(--jade-dim)}

  /* sidebar */
  aside{width:230px;min-width:230px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:16px 14px}
  .logo{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
  .logo b{font-size:20px;letter-spacing:.5px}
  .logo b i{color:var(--jade);font-style:normal}
  .proj{color:var(--muted);font-size:12.5px;margin-bottom:18px;word-break:break-all}
  .side-h{font-size:11px;letter-spacing:.12em;color:var(--dim);margin:14px 0 6px}
  .srv{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;font-size:13px}
  .srv:hover{background:var(--panel2)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--jade);flex:none}
  .dot.bad{background:var(--red)}
  .dot.unknown{background:var(--dim)}
  .srv small{color:var(--dim);margin-left:auto;font-size:11px}
  .side-foot{margin-top:auto;color:var(--dim);font-size:11.5px}

  /* main */
  main{flex:1;display:flex;flex-direction:column;min-width:0}
  header{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--panel)}
  header .crumb{font-size:13px;color:var(--muted);margin-right:auto}
  header .crumb b{color:var(--text)}
  label.chk{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:13px;user-select:none}
  #cards{flex:1;overflow-y:auto;padding:18px;display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));align-content:start}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 14px 12px;display:flex;flex-direction:column;gap:10px}
  .card-h{display:flex;align-items:center;gap:8px}
  .card-h b{font-size:15.5px}
  .badge{font-size:10.5px;padding:2px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted);letter-spacing:.04em}
  .badge.rt{color:#7ec8ff;border-color:#28455c}
  .badge.bg{color:#c9a6ff;border-color:#453064}
  .chips{display:flex;flex-wrap:wrap;gap:5px}
  .chip{font-size:11px;color:var(--dim);background:var(--panel2);padding:1.5px 8px;border-radius:12px}
  .chip.dep{color:var(--amber)}
  table.st{width:100%;border-collapse:collapse;font-size:12.5px}
  table.st td{padding:5px 6px;border-top:1px solid var(--line);color:var(--muted);white-space:nowrap}
  table.st td:first-child{color:var(--text)}
  .pill{display:inline-block;font-size:11px;padding:1px 9px;border-radius:12px;font-weight:600}
  .pill.ok{background:rgba(46,168,126,.15);color:var(--jade)}
  .pill.failed{background:rgba(229,83,75,.15);color:var(--red)}
  .pill.never{background:var(--panel2);color:var(--dim);font-weight:400}
  .pill.running{background:rgba(212,167,44,.15);color:var(--amber)}
  .card-actions{display:flex;gap:7px;margin-top:2px}
  .card-actions button{font-size:12.5px;padding:4px 11px}
  .mono{font-family:var(--mono)}

  /* activity drawer */
  #drawer{border-top:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;height:38px;transition:height .18s ease}
  #drawer.open{height:44vh}
  #drawer-bar{display:flex;align-items:center;gap:10px;padding:7px 16px;cursor:pointer;user-select:none;flex:none}
  #drawer-bar .t{font-size:12.5px;letter-spacing:.1em;color:var(--dim)}
  #drawer-body{flex:1;display:none;min-height:0}
  #drawer.open #drawer-body{display:flex}
  #joblist{width:270px;min-width:270px;border-right:1px solid var(--line);overflow-y:auto;padding:8px}
  .jobrow{padding:7px 9px;border-radius:8px;font-size:12.5px;cursor:pointer;display:flex;gap:8px;align-items:center}
  .jobrow:hover,.jobrow.sel{background:var(--panel2)}
  .jobrow .when{color:var(--dim);font-size:11px;margin-left:auto}
  #term{flex:1;background:#080d0b;font-family:var(--mono);font-size:12.3px;line-height:1.55;padding:12px 14px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;color:#cfe3da}

  /* modal */
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:10}
  #overlay.show{display:flex}
  #modal{width:min(760px,92vw);max-height:84vh;background:var(--panel);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column}
  #modal-h{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line)}
  #modal-h b{margin-right:auto}
  #modal-b{padding:14px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
  #modal pre{background:#080d0b;border:1px solid var(--line);border-radius:9px;padding:11px;font-family:var(--mono);font-size:12.3px;white-space:pre-wrap;word-break:break-word;max-height:46vh;overflow-y:auto}
  select{font:inherit;background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:7px;padding:5px 8px}
  textarea{font-family:var(--mono);font-size:12.5px;background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:10px;min-height:90px;outline:none;resize:vertical}
  textarea:focus{border-color:var(--jade-dim)}
  .hint{color:var(--dim);font-size:12px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  #toast{position:fixed;bottom:18px;right:18px;background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--red);border-radius:9px;padding:10px 14px;font-size:13px;display:none;max-width:420px;z-index:20}
</style>
</head>
<body>
<aside>
  <div class="logo"><b>f<i>1</i></b><span class="badge">dashboard</span></div>
  <div class="proj" id="side-proj">loading…</div>
  <div class="side-h">SERVERS</div>
  <div id="side-servers"></div>
  <div class="side-foot">f1 runner · <span id="side-branch"></span></div>
</aside>

<main>
  <header>
    <span class="crumb"><b id="h-proj">…</b> <span id="h-repo"></span></span>
    <input type="text" id="ref" placeholder="ref (default branch)" size="14">
    <label class="chk"><input type="checkbox" id="force"> force</label>
    <button id="refresh" title="refresh">↻</button>
    <button class="primary" id="deploy-all">Deploy all</button>
  </header>

  <div id="cards"></div>

  <div id="drawer">
    <div id="drawer-bar">
      <span class="t">ACTIVITY</span>
      <span id="drawer-live" class="pill never">idle</span>
      <span style="margin-left:auto;color:var(--dim)" id="drawer-arrow">▲</span>
    </div>
    <div id="drawer-body">
      <div id="joblist"></div>
      <div id="term"></div>
    </div>
  </div>
</main>

<div id="overlay"><div id="modal">
  <div id="modal-h"><b id="modal-title"></b><button onclick="closeModal()">✕</button></div>
  <div id="modal-b"></div>
</div></div>
<div id="toast"></div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let token = localStorage.getItem('f1_token') || '';
let overview = null, jobs = [], currentJob = null, es = null;

function toast(msg){ const t=$('#toast'); t.textContent=msg; t.style.display='block'; clearTimeout(t._h); t._h=setTimeout(()=>t.style.display='none', 6000); }

async function api(path, opts={}){
  opts.headers = Object.assign({}, opts.headers, token ? {Authorization:'Bearer '+token} : {});
  if (opts.body && !opts.method) opts.method='POST';
  const res = await fetch(path, opts);
  if (res.status === 401){
    const t = prompt('This dashboard is token-protected.\nEnter the f1 ui token:');
    if (t){ token=t; localStorage.setItem('f1_token', t); return api(path, opts); }
    throw new Error('unauthorized');
  }
  if (!res.ok) throw new Error(await res.text() || res.statusText);
  return res.json();
}

/* ---------- overview ---------- */
function ago(iso){
  if(!iso) return '';
  const s = (Date.now()-new Date(iso).getTime())/1000;
  if (s<60) return Math.max(0,s|0)+'s ago';
  if (s<3600) return (s/60|0)+'m ago';
  if (s<172800) return (s/3600|0)+'h ago';
  return (s/86400|0)+'d ago';
}
function statusFor(server, comp){
  return (overview.status||[]).find(r => r.server===server && r.component===comp);
}
function render(){
  const o = overview;
  $('#h-proj').textContent = o.project;
  $('#h-repo').textContent = '· '+o.repo;
  $('#side-proj').textContent = o.project;
  $('#side-branch').textContent = o.branch;
  $('#ref').placeholder = 'ref (default '+o.branch+')';

  $('#side-servers').innerHTML = (o.servers||[]).map(s => {
    const bad = (o.unreachable||[]).includes(s.name);
    const anyState = (o.status||[]).some(r => r.server===s.name);
    const cls = bad ? 'bad' : (anyState ? '' : 'unknown');
    return `<div class="srv" title="${esc(s.user)}@${esc(s.host)} · ${esc(s.root)}">
      <span class="dot ${cls}"></span>${esc(s.name)}<small>${esc(s.os==='windows'?'win':'linux')}</small></div>`;
  }).join('');

  $('#cards').innerHTML = (o.components||[]).map(c => {
    const rows = c.servers.map(sv => {
      const st = statusFor(sv, c.name);
      const pill = !st ? `<span class="pill never">never deployed</span>`
        : `<span class="pill ${st.state.status==='ok'?'ok':'failed'}">${esc(st.state.status)}</span>`;
      const sha = st ? `<span class="mono">${esc((st.state.sha||'').slice(0,7)||'—')}</span>` : '—';
      const slot = st && st.state.slot ? `${esc(st.state.slot)}:${st.state.port}` : '—';
      const when = st ? ago(st.state.deployedAt) : '';
      const err = st && st.state.error ? ` title="${esc(st.state.error)}"` : '';
      return `<tr${err}><td>${esc(sv)}</td><td>${pill}</td><td>${sha}</td><td>${esc(slot)}</td><td>${esc(when)}</td></tr>`;
    }).join('');
    const deps = (c.dependsOn||[]).map(d=>`<span class="chip dep">⇠ ${esc(d)}</span>`).join('');
    const prov = (c.provision||[]).map(p=>`<span class="chip">${esc(p)}</span>`).join('');
    return `<div class="card">
      <div class="card-h"><b>${esc(c.name)}</b>
        <span class="badge rt">${esc(c.runtime||'?')}</span>
        ${c.blueGreen?'<span class="badge bg">blue/green</span>':''}
        <span style="margin-left:auto" class="chip mono">${esc(c.path)}</span>
      </div>
      ${(deps||prov)?`<div class="chips">${deps}${prov}</div>`:''}
      <table class="st">${rows}</table>
      <div class="card-actions">
        <button class="primary" onclick="deployComp('${esc(c.name)}')">Deploy</button>
        <button class="danger" onclick="rollback('${esc(c.name)}')">Rollback</button>
        <button onclick="openLogs('${esc(c.name)}')">Logs</button>
        <button onclick="openEnv('${esc(c.name)}')">Env</button>
      </div>
    </div>`;
  }).join('') || '<div class="hint">no components in f1.yml</div>';
}
async function refresh(){
  try{ overview = await api('/api/overview'); render(); }
  catch(e){ toast('overview: '+e.message); }
}

/* ---------- jobs / terminal ---------- */
function drawerOpen(open){ $('#drawer').classList.toggle('open', open); $('#drawer-arrow').textContent = open?'▼':'▲'; }
$('#drawer-bar').onclick = () => drawerOpen(!$('#drawer').classList.contains('open'));

async function refreshJobs(){
  try{ jobs = await api('/api/jobs'); }catch(e){ return; }
  const live = jobs.find(j=>j.status==='running');
  const lp = $('#drawer-live');
  lp.className = 'pill ' + (live?'running':(jobs[0]? (jobs[0].status==='ok'?'ok':'failed') : 'never'));
  lp.textContent = live ? 'running: '+live.title : (jobs[0]? jobs[0].status+': '+jobs[0].title : 'idle');
  $('#joblist').innerHTML = jobs.map(j => `
    <div class="jobrow ${currentJob===j.id?'sel':''}" onclick="watchJob(${j.id})">
      <span class="pill ${j.status==='running'?'running':(j.status==='ok'?'ok':'failed')}">${esc(j.status)}</span>
      <span>${esc(j.title)}</span><span class="when">${ago(j.started)}</span>
    </div>`).join('') || '<div class="hint" style="padding:8px">no activity yet</div>';
}
function watchJob(id){
  currentJob = id;
  if (es){ es.close(); es=null; }
  const term = $('#term'); term.textContent='';
  drawerOpen(true);
  es = new EventSource('/api/jobs/stream?id='+id+(token?'&token='+encodeURIComponent(token):''));
  const append = txt => {
    const stick = term.scrollTop + term.clientHeight >= term.scrollHeight - 8;
    term.textContent += txt;
    if (stick) term.scrollTop = term.scrollHeight;
  };
  es.onmessage = ev => append(ev.data + '\n');
  es.addEventListener('done', ev => { append('\n── '+ev.data+' ──\n'); es.close(); es=null; refresh(); refreshJobs(); });
  es.onerror = () => { if(es){ es.close(); es=null; } };
  refreshJobs();
}

/* ---------- actions ---------- */
function deployBody(extra){
  return Object.assign({ ref: $('#ref').value.trim(), force: $('#force').checked }, extra);
}
async function startJob(path, body){
  try{
    const r = await api(path, {body: JSON.stringify(body)});
    watchJob(r.job);
  }catch(e){ toast(e.message); }
}
$('#deploy-all').onclick = () => startJob('/api/deploy', deployBody({all:true}));
function deployComp(name){ startJob('/api/deploy', deployBody({components:[name]})); }
function rollback(name){
  const servers = overview.components.find(c=>c.name===name)?.servers || [];
  const sv = servers.length>1 ? prompt('Rollback '+name+' on which server? ('+servers.join(', ')+') — empty = all') : '';
  if (sv===null) return;
  startJob('/api/rollback', {component:name, server:(sv||'').trim()});
}
$('#refresh').onclick = () => { refresh(); refreshJobs(); };

/* ---------- modals ---------- */
function openModal(title, bodyHTML){ $('#modal-title').textContent=title; $('#modal-b').innerHTML=bodyHTML; $('#overlay').classList.add('show'); }
function closeModal(){ $('#overlay').classList.remove('show'); }
$('#overlay').addEventListener('click', e => { if(e.target.id==='overlay') closeModal(); });

function serverOptions(comp){
  const servers = overview.components.find(c=>c.name===comp)?.servers || [];
  return servers.map((s,i)=>`<option value="${esc(s)}"${i===0?' selected':''}>${esc(s)}</option>`).join('');
}
async function openLogs(comp){
  openModal('Logs — '+comp, `
    <div class="row">
      <select id="log-server">${serverOptions(comp)}</select>
      <select id="log-n"><option>100</option><option selected>200</option><option>500</option><option>1000</option></select>
      <button class="primary" onclick="fetchLogs('${esc(comp)}')">Fetch</button>
    </div><pre id="log-out">…</pre>`);
  fetchLogs(comp);
}
async function fetchLogs(comp){
  const out = $('#log-out'); out.textContent='fetching…';
  try{
    const r = await api('/api/logs?component='+encodeURIComponent(comp)+'&server='+encodeURIComponent($('#log-server').value)+'&n='+$('#log-n').value);
    out.textContent = r.output || '(empty)';
  }catch(e){ out.textContent = 'error: '+e.message; }
}
async function openEnv(comp){
  openModal('Env — '+comp, `
    <div class="row"><select id="env-server">${serverOptions(comp)}</select>
      <button onclick="fetchEnv('${esc(comp)}')">Reload</button></div>
    <pre id="env-out">…</pre>
    <div class="hint">Add or update keys (one KEY=VALUE per line). To remove, list key names in the box and press Unset.</div>
    <textarea id="env-in" placeholder="DB_PASS=s3cret&#10;SMTP_KEY=abc"></textarea>
    <div class="row">
      <button class="primary" onclick="envOp('${esc(comp)}','set')">Set</button>
      <button class="danger" onclick="envOp('${esc(comp)}','unset')">Unset</button>
      <span class="hint">applies on every deploy after the change</span>
    </div>`);
  fetchEnv(comp);
}
async function fetchEnv(comp){
  const out = $('#env-out'); out.textContent='fetching…';
  try{
    const r = await api('/api/env?component='+encodeURIComponent(comp)+'&server='+encodeURIComponent($('#env-server').value));
    out.textContent = r.output || '(empty)';
  }catch(e){ out.textContent='error: '+e.message; }
}
async function envOp(comp, op){
  const lines = $('#env-in').value.split('\n').map(l=>l.trim()).filter(Boolean);
  if (!lines.length) return toast('nothing to '+op);
  if (op==='set' && lines.some(l=>!l.includes('='))) return toast('set needs KEY=VALUE lines');
  const args = op==='unset' ? lines.map(l=>l.split('=')[0]) : lines;
  try{
    const r = await api('/api/env', {body: JSON.stringify({component:comp, op, args, server:$('#env-server').value})});
    if (!r.ok) toast('env '+op+' had errors — see output');
    $('#env-in').value='';
    fetchEnv(comp);
  }catch(e){ toast(e.message); }
}

/* ---------- boot ---------- */
refresh(); refreshJobs();
setInterval(refresh, 8000);
setInterval(refreshJobs, 5000);
</script>
</body>
</html>
